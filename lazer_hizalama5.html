<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lazer Hizalama</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#header { display:grid; grid-template-columns:1fr 1fr; background:#111; border-bottom:1px solid #333; padding:8px 12px; gap:8px; flex-shrink:0; }
.hcell { background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:8px 10px; }
.lbl { font-size:11px; color:#888; margin-bottom:2px; }
.val { font-size:22px; font-weight:500; color:#fff; }
.green { color:#00ff44; }
.yellow { color:#ffcc00; }
.red { color:#ff4444; }
#camWrap { position:relative; flex:1; overflow:hidden; background:#000; }
#video { width:100%; height:100%; object-fit:cover; display:block; filter:grayscale(1) contrast(2) brightness(0.85); }
#oc { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
#statusBar { background:#0d0d0d; padding:5px 12px; font-size:12px; color:#aaa; text-align:center; border-top:1px solid #222; flex-shrink:0; }
#footer { background:#111; padding:10px 12px; display:flex; gap:8px; flex-shrink:0; }
button { flex:1; padding:9px; border-radius:8px; border:1px solid #444; background:#1a1a1a; color:#fff; font-size:13px; cursor:pointer; }
button.primary { background:#0a2a15; border-color:#00ff44; color:#00ff44; }
</style>
</head>
<body>
<div id="header">
  <div class="hcell"><div class="lbl">Noz &#216;</div><div class="val" id="nozVal">--</div></div>
  <div class="hcell"><div class="lbl">Batarya</div><div class="val" id="battVal" style="font-size:16px;">--%</div></div>
  <div class="hcell"><div class="lbl">&#916;X (mm)</div><div class="val" id="dxVal">--</div></div>
  <div class="hcell"><div class="lbl">&#916;Y (mm)</div><div class="val" id="dyVal">--</div></div>
</div>
<div id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="oc"></canvas>
</div>
<div id="statusBar">Kamera baslatiliyor...</div>
<div id="footer">
  <button class="primary" id="btnDiam">Cap: 1.60 mm</button>
  <button id="btnSens">Hassasiyet: Orta</button>
</div>
<script>
const video=document.getElementById('video');
const oc=document.getElementById('oc');
const octx=oc.getContext('2d');
const statusBar=document.getElementById('statusBar');
const nozVal=document.getElementById('nozVal');
const dxEl=document.getElementById('dxVal');
const dyEl=document.getElementById('dyVal');
const battVal=document.getElementById('battVal');
const diams=[0.8,1.0,1.2,1.5,1.6,2.0,2.5,3.0];
let diamIdx=4, sensLevel=1;
const sensLabels=['Dusuk','Orta','Yuksek'];
const redThresh=[22,40,62];

// Küçük canvas — sadece tespit
const wc=document.createElement('canvas');
const wctx=wc.getContext('2d',{willReadFrequently:true});
const PW=160, PH=120;
wc.width=PW; wc.height=PH;

// Batarya
(async()=>{
  try{
    const b=await navigator.getBattery();
    const upd=()=>{
      const p=Math.round(b.level*100);
      battVal.textContent=p+'%';
      battVal.className='val '+(p>50?'green':p>20?'yellow':'red');
    };
    upd(); b.addEventListener('levelchange',upd);
  }catch(e){battVal.textContent='N/A';}
})();

async function startCam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}
    });
    video.srcObject=s;
    video.onloadedmetadata=()=>{
      statusBar.textContent='Kamera aktif';
      requestAnimationFrame(loop);
    };
  }catch(e){statusBar.textContent='Kamera izni gerekli';}
}

// Kırmızı — sadece nozzle dairesi içinde ara
function findRed(data,W,H,ncx,ncy,nr){
  const t=redThresh[sensLevel];
  let sx=0,sy=0,n=0;
  for(let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2];
    if(r>130&&g<t&&b<t&&r>g*2.2&&r>b*2.2){
      const px=(i/4)%W, py=Math.floor((i/4)/W);
      // Eğer nozzle biliniyorsa sadece içini kontrol et
      if(ncx>=0){
        const dx=px-ncx, dy=py-ncy;
        if(dx*dx+dy*dy > nr*nr*1.1) continue;
      }
      sx+=px; sy+=py; n++;
    }
  }
  return n>6?{x:sx/n,y:sy/n}:null;
}

// Siyah daire tespiti
function findDark(data,W,H){
  const pts=[];
  const mg=Math.floor(Math.min(W,H)*0.08);
  for(let y=mg;y<H-mg;y+=2){
    for(let x=mg;x<W-mg;x+=2){
      const i=(y*W+x)*4;
      if((data[i]+data[i+1]+data[i+2])/3<40) pts.push([x,y]);
    }
  }
  if(pts.length<20) return null;
  let sx=0,sy=0;
  for(const[x,y]of pts){sx+=x;sy+=y;}
  const cx=sx/pts.length, cy=sy/pts.length;
  const ds=pts.map(([x,y])=>Math.sqrt((x-cx)**2+(y-cy)**2)).sort((a,b)=>a-b);
  const r=ds[Math.floor(ds.length*0.6)];
  if(r<Math.min(W,H)*0.05||r>Math.min(W,H)*0.46) return null;
  if(ds.filter(d=>d<=r*1.4).length/ds.length<0.45) return null;
  return{cx,cy,r};
}

// Dart hedefi — kalın belirgin
function drawTarget(ctx,cx,cy,r,color,W,H){
  // Gölge efekti — daha belirgin görünmesi için
  ctx.shadowColor='rgba(0,0,0,0.8)';
  ctx.shadowBlur=6;

  // Dış büyük daire — kalın
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=color; ctx.lineWidth=6; ctx.stroke();

  // İç küçük daire
  ctx.beginPath(); ctx.arc(cx,cy,r*0.3,0,Math.PI*2);
  ctx.strokeStyle=color; ctx.lineWidth=4; ctx.stroke();

  // Dışarıda kalın düz çizgiler
  ctx.lineWidth=6; ctx.strokeStyle=color;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(cx-r-2,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+r+2,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,cy-r-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy+r+2); ctx.lineTo(cx,H); ctx.stroke();

  // İçeride kesik çizgiler
  ctx.save();
  ctx.setLineDash([14,8]);
  ctx.lineWidth=4; ctx.strokeStyle=color;
  ctx.beginPath(); ctx.moveTo(cx-r+2,cy); ctx.lineTo(cx+r-2,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-r+2); ctx.lineTo(cx,cy+r-2); ctx.stroke();
  ctx.restore();

  // Merkez + işareti
  ctx.shadowBlur=0;
  ctx.lineWidth=5; ctx.strokeStyle=color;
  ctx.beginPath();
  ctx.moveTo(cx-20,cy); ctx.lineTo(cx+20,cy);
  ctx.moveTo(cx,cy-20); ctx.lineTo(cx,cy+20);
  ctx.stroke();

  // Merkez dolu nokta
  ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();

  ctx.shadowBlur=0;
}

let fc=0, lastN=null, lastR=null;

function loop(){
  if(video.readyState<2){requestAnimationFrame(loop);return;}
  fc++;

  const ow=oc.offsetWidth, oh=oc.offsetHeight;
  if(oc.width!==ow||oc.height!==oh){oc.width=ow; oc.height=oh;}
  octx.clearRect(0,0,ow,oh);

  // Küçük canvas işleme
  wctx.drawImage(video,0,0,PW,PH);
  const raw=wctx.getImageData(0,0,PW,PH).data;

  // Nozzle her 5 frame
  if(fc%5===0) lastN=findDark(raw,PW,PH);

  // Kırmızı her frame — nozzle içinde ara
  const ncx=lastN?lastN.cx:-1;
  const ncy=lastN?lastN.cy:-1;
  const nr=lastN?lastN.r:-1;
  lastR=findRed(raw,PW,PH,ncx,ncy,nr);

  const sx=ow/PW, sy=oh/PH;
  const nd=diams[diamIdx];

  if(lastN){
    const nx=lastN.cx*sx, ny=lastN.cy*sy, nr2=lastN.r*(sx+sy)/2;
    const mpp=nd/(lastN.r*2);
    nozVal.textContent=nd.toFixed(2);
    let color='#ffcc00', centered=false;

    if(lastR){
      const rx=lastR.x*sx, ry=lastR.y*sy;
      const dxp=lastR.x-lastN.cx, dyp=lastR.y-lastN.cy;
      const dist=Math.sqrt(dxp**2+dyp**2);
      centered=dist<lastN.r*0.12;
      color=centered?'#00ff44':'#ffcc00';
      const dxm=dxp*mpp, dym=dyp*mpp;
      const fmt=v=>(v>=0?'+':'')+v.toFixed(2);
      const cls=v=>Math.abs(v)<0.05?'val green':Math.abs(v)<0.15?'val yellow':'val red';
      dxEl.textContent=fmt(dxm); dxEl.className=cls(dxm);
      dyEl.textContent=fmt(dym); dyEl.className=cls(dym);

      // Kırmızı nokta
      octx.beginPath(); octx.arc(rx,ry,16,0,Math.PI*2);
      octx.fillStyle=centered?'rgba(0,255,68,0.95)':'rgba(255,30,30,0.95)';
      octx.fill(); octx.strokeStyle='#fff'; octx.lineWidth=3; octx.stroke();

      // Ok
      if(!centered&&dist>4){
        const ang=Math.atan2(dyp,dxp);
        const len=Math.min(nr2*0.55,70);
        const ex=nx+Math.cos(ang)*len, ey=ny+Math.sin(ang)*len;
        octx.beginPath(); octx.moveTo(nx,ny); octx.lineTo(ex,ey);
        octx.strokeStyle='#ff8800'; octx.lineWidth=5; octx.stroke();
        octx.beginPath();
        octx.moveTo(ex,ey);
        octx.lineTo(ex-Math.cos(ang-0.4)*20,ey-Math.sin(ang-0.4)*20);
        octx.lineTo(ex-Math.cos(ang+0.4)*20,ey-Math.sin(ang+0.4)*20);
        octx.closePath(); octx.fillStyle='#ff8800'; octx.fill();
      }
      statusBar.textContent=centered?'✓ MERKEZ — Hizalandi!':'Hizalanmiyor — vidaları ayarlayin';
    } else {
      dxEl.textContent='--'; dxEl.className='val';
      dyEl.textContent='--'; dyEl.className='val';
      statusBar.textContent='Nozzle bulundu — kirmizi isik bekleniyor';
    }

    drawTarget(octx,nx,ny,nr2,color,ow,oh);

  } else {
    nozVal.textContent='--';
    dxEl.textContent='--'; dxEl.className='val';
    dyEl.textContent='--'; dyEl.className='val';
    statusBar.textContent='Nozzle tespit edilemiyor — yaklastirin';
  }

  requestAnimationFrame(loop);
}

document.getElementById('btnDiam').addEventListener('click',()=>{
  diamIdx=(diamIdx+1)%diams.length;
  document.getElementById('btnDiam').textContent='Cap: '+diams[diamIdx].toFixed(2)+' mm';
});
document.getElementById('btnSens').addEventListener('click',()=>{
  sensLevel=(sensLevel+1)%3;
  document.getElementById('btnSens').textContent='Hassasiyet: '+sensLabels[sensLevel];
});

startCam();
</script>
</body>
</html>
