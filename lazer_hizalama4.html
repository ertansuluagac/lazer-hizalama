<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lazer Hizalama</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

#header {
  display:grid; grid-template-columns:1fr 1fr;
  background:#111; border-bottom:1px solid #333;
  padding:8px 12px; gap:8px;
}
.hcell { background:#1a1a1a; border:1px solid #333; border-radius:6px; padding:8px 10px; }
.hcell .lbl { font-size:11px; color:#888; margin-bottom:2px; }
.hcell .val { font-size:22px; font-weight:500; color:#fff; }
.val.green { color:#00ff44; }
.val.yellow { color:#ffcc00; }
.val.red { color:#ff4444; }

.batt-wrap { display:flex; align-items:center; gap:6px; margin-top:2px; }
.batt-box { width:40px; height:18px; border:2px solid #888; border-radius:3px; padding:2px; position:relative; }
.batt-box::after { content:''; position:absolute; right:-5px; top:4px; width:3px; height:10px; background:#888; border-radius:1px; }
.batt-inner { height:100%; border-radius:1px; transition:width 0.5s, background 0.5s; }

#camWrap { position:relative; flex:1; overflow:hidden; background:#000; }
#video { display:none; }
#processedCanvas { width:100%; height:100%; object-fit:cover; display:block; }
#overlayCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

#statusBar { background:#0d0d0d; padding:5px 12px; font-size:12px; color:#aaa; text-align:center; border-top:1px solid #222; min-height:26px; }

#footer { background:#111; padding:10px 12px; display:flex; gap:8px; }
button { flex:1; padding:9px; border-radius:8px; border:1px solid #444; background:#1a1a1a; color:#fff; font-size:13px; cursor:pointer; }
button.primary { background:#0a2a15; border-color:#00ff44; color:#00ff44; }
button:active { opacity:0.7; }
</style>
</head>
<body>

<div id="header">
  <div class="hcell">
    <div class="lbl">Noz &#216;</div>
    <div class="val" id="nozVal">--</div>
  </div>
  <div class="hcell">
    <div class="lbl">Batarya</div>
    <div class="batt-wrap">
      <div class="val" id="battVal" style="font-size:16px;">--%</div>
      <div class="batt-box"><div class="batt-inner" id="battInner"></div></div>
    </div>
  </div>
  <div class="hcell">
    <div class="lbl">&#916;X (mm)</div>
    <div class="val" id="dxVal">--</div>
  </div>
  <div class="hcell">
    <div class="lbl">&#916;Y (mm)</div>
    <div class="val" id="dyVal">--</div>
  </div>
</div>

<div id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="processedCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>
</div>

<div id="statusBar">Kamera baslatiliyor...</div>

<div id="footer">
  <button class="primary" id="btnDiam">Cap: 1.60 mm</button>
  <button id="btnSens">Hassasiyet: Orta</button>
</div>

<script>
const video       = document.getElementById('video');
const pCanvas     = document.getElementById('processedCanvas');
const pCtx        = pCanvas.getContext('2d', {willReadFrequently:true});
const oc          = document.getElementById('overlayCanvas');
const octx        = oc.getContext('2d');
const statusBar   = document.getElementById('statusBar');
const nozVal      = document.getElementById('nozVal');
const dxEl        = document.getElementById('dxVal');
const dyEl        = document.getElementById('dyVal');
const battVal     = document.getElementById('battVal');
const battInner   = document.getElementById('battInner');

const diams       = [0.8,1.0,1.2,1.5,1.6,2.0,2.5,3.0];
let diamIdx       = 4;
let sensLevel     = 1;
const sensLabels  = ['Dusuk','Orta','Yuksek'];
const redThresh   = [25, 42, 65];

// Batarya API
(async () => {
  try {
    const b = await navigator.getBattery();
    const upd = () => {
      const p = Math.round(b.level * 100);
      battVal.textContent = p + '%';
      battInner.style.width = p + '%';
      const c = p > 50 ? '#00ff44' : p > 20 ? '#ffcc00' : '#ff4444';
      battInner.style.background = c;
      battVal.style.color = c;
    };
    upd();
    b.addEventListener('levelchange', upd);
  } catch(e) { battVal.textContent = 'N/A'; }
})();

// Ön kamera
async function startCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width:{ideal:1280}, height:{ideal:720} }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      pCanvas.width  = video.videoWidth;
      pCanvas.height = video.videoHeight;
      statusBar.textContent = 'Kamera aktif — Nozzle\'i kameraya tutun';
      requestAnimationFrame(loop);
    };
  } catch(e) {
    statusBar.textContent = 'Kamera izni gerekli';
  }
}

// Görüntüyü gri + kontrast artır (BOCHU tarzı)
function toGrayContrast(src, dst, W, H) {
  const s = src, d = dst;
  for (let i = 0; i < s.length; i += 4) {
    // Önce kırmızı kanalı sakla (tespit için)
    const r = s[i], g = s[i+1], b = s[i+2];
    // Gri
    let gray = Math.round(0.299*r + 0.587*g + 0.114*b);
    // Kontrast artır (stretch)
    gray = Math.min(255, Math.max(0, (gray - 80) * 2.2));
    d[i]   = gray;
    d[i+1] = gray;
    d[i+2] = gray;
    d[i+3] = 255;
  }
}

// Sobel kenar + dairesel Hough benzeri
function findNozzle(gray, W, H) {
  // Sobel
  const edge = new Uint8Array(W * H);
  for (let y = 1; y < H-1; y++) {
    for (let x = 1; x < W-1; x++) {
      const p = (y,x) => gray[(y*W+x)*4];
      const gx = -p(y-1,x-1)+p(y-1,x+1) - 2*p(y,x-1)+2*p(y,x+1) - p(y+1,x-1)+p(y+1,x+1);
      const gy = -p(y-1,x-1)-2*p(y-1,x)+(-p(y-1,x+1)) + p(y+1,x-1)+2*p(y+1,x)+p(y+1,x+1);
      const mag = Math.sqrt(gx*gx+gy*gy);
      edge[y*W+x] = mag > 60 ? 1 : 0;
    }
  }

  // Kenar noktalarını örnekle
  const pts = [];
  const mg = Math.floor(Math.min(W,H)*0.07);
  for (let y = mg; y < H-mg; y += 3) {
    for (let x = mg; x < W-mg; x += 3) {
      if (edge[y*W+x]) pts.push([x,y]);
    }
  }
  if (pts.length < 60) return null;

  // Ağırlık merkezi
  let sx=0, sy=0;
  for (const [x,y] of pts) { sx+=x; sy+=y; }
  const cx = sx/pts.length, cy = sy/pts.length;

  // Uzaklıklar → medyan = yarıçap
  const ds = pts.map(([x,y]) => Math.sqrt((x-cx)**2+(y-cy)**2)).sort((a,b)=>a-b);
  const r  = ds[Math.floor(ds.length*0.5)];

  const minR = Math.min(W,H)*0.06;
  const maxR = Math.min(W,H)*0.47;
  if (r < minR || r > maxR) return null;

  // Dairesellik
  const lo=r*0.78, hi=r*1.22;
  const score = ds.filter(d=>d>=lo&&d<=hi).length / ds.length;
  if (score < 0.22) return null;

  return {cx, cy, r};
}

// Kırmızı ışık
function findRed(raw, W, H) {
  const t = redThresh[sensLevel];
  let sx=0, sy=0, n=0;
  for (let i=0; i<raw.length; i+=4) {
    const r=raw[i], g=raw[i+1], b=raw[i+2];
    if (r>130 && g<t && b<t && r>g*2.1 && r>b*2.1) {
      sx += (i/4)%W; sy += Math.floor((i/4)/W); n++;
    }
  }
  return n > 15 ? {x:sx/n, y:sy/n} : null;
}

let rawData = null;

function loop() {
  if (video.readyState < 2) { requestAnimationFrame(loop); return; }

  // Ham görüntü al
  pCtx.drawImage(video, 0, 0, pCanvas.width, pCanvas.height);
  const W = pCanvas.width, H = pCanvas.height;
  const imgData = pCtx.getImageData(0, 0, W, H);
  rawData = new Uint8ClampedArray(imgData.data); // ham kopyala (kırmızı tespit için)

  // Gri+kontrast uygula ve ekrana bas
  toGrayContrast(imgData.data, imgData.data, W, H);
  pCtx.putImageData(imgData, 0, 0);

  // Overlay
  oc.width  = oc.offsetWidth;
  oc.height = oc.offsetHeight;
  const ow=oc.width, oh=oc.height;
  const sx=ow/W, sy=oh/H;
  octx.clearRect(0,0,ow,oh);

  const nozzle = findNozzle(imgData.data, W, H);
  const red    = findRed(rawData, W, H);
  const nozDiam = diams[diamIdx];

  if (nozzle) {
    const nx = nozzle.cx*sx, ny = nozzle.cy*sy;
    const nr = nozzle.r*(sx+sy)/2;
    const mmPerPx = nozDiam / (nozzle.r*2);

    nozVal.textContent = nozDiam.toFixed(2);

    let color = '#ffcc00';
    let centered = false;

    if (red) {
      const rx=red.x*sx, ry=red.y*sy;
      const dxPx = red.x - nozzle.cx;
      const dyPx = red.y - nozzle.cy;
      const dist = Math.sqrt(dxPx**2+dyPx**2);
      const dxMm = dxPx*mmPerPx;
      const dyMm = dyPx*mmPerPx;
      centered = dist < nozzle.r*0.12;
      color = centered ? '#00ff44' : '#ffcc00';

      const fmt = v => (v>=0?'+':'')+v.toFixed(2);
      const cls = v => Math.abs(v)<0.05?'val green':Math.abs(v)<0.15?'val yellow':'val red';
      dxEl.textContent = fmt(dxMm); dxEl.className = cls(dxMm);
      dyEl.textContent = fmt(dyMm); dyEl.className = cls(dyMm);

      // Kırmızı nokta
      octx.beginPath();
      octx.arc(rx, ry, 10, 0, Math.PI*2);
      octx.fillStyle = centered ? '#00ff44' : '#ff2222';
      octx.fill();
      octx.strokeStyle = '#fff'; octx.lineWidth = 2; octx.stroke();

      // Ok (hizalanmadıysa)
      if (!centered) {
        const ang = Math.atan2(dyPx, dxPx);
        const len = Math.min(nr*0.55, 55);
        const ex = nx+Math.cos(ang)*len, ey = ny+Math.sin(ang)*len;
        octx.beginPath(); octx.moveTo(nx,ny); octx.lineTo(ex,ey);
        octx.strokeStyle='#ffaa00'; octx.lineWidth=2.5; octx.stroke();
        octx.beginPath();
        octx.moveTo(ex, ey);
        octx.lineTo(ex-Math.cos(ang-0.4)*13, ey-Math.sin(ang-0.4)*13);
        octx.lineTo(ex-Math.cos(ang+0.4)*13, ey-Math.sin(ang+0.4)*13);
        octx.closePath(); octx.fillStyle='#ffaa00'; octx.fill();
      }

      statusBar.textContent = centered ? '✓ MERKEZ — Hizalandi!' : 'Hizalanmiyor — vidaları ayarlayin';
    } else {
      dxEl.textContent='--'; dxEl.className='val';
      dyEl.textContent='--'; dyEl.className='val';
      statusBar.textContent = 'Nozzle bulundu — kirmizi isik bekleniyor';
    }

    // Nozzle dairesi
    octx.beginPath();
    octx.arc(nx, ny, nr, 0, Math.PI*2);
    octx.strokeStyle = color; octx.lineWidth = 3; octx.stroke();

    // Kesik çapraz çizgiler
    octx.save();
    octx.setLineDash([8,5]);
    octx.strokeStyle = color; octx.lineWidth = 1.5;
    octx.beginPath();
    octx.moveTo(nx-nr-18, ny); octx.lineTo(nx+nr+18, ny);
    octx.moveTo(nx, ny-nr-18); octx.lineTo(nx, ny+nr+18);
    octx.stroke();
    octx.restore();

    // Merkez işareti
    octx.beginPath();
    octx.arc(nx, ny, 5, 0, Math.PI*2);
    octx.strokeStyle = color; octx.lineWidth = 2; octx.stroke();
    octx.beginPath();
    octx.moveTo(nx-12,ny); octx.lineTo(nx+12,ny);
    octx.moveTo(nx,ny-12); octx.lineTo(nx,ny+12);
    octx.strokeStyle = color; octx.lineWidth = 2; octx.stroke();

  } else {
    nozVal.textContent='--'; nozVal.className='val';
    dxEl.textContent='--'; dxEl.className='val';
    dyEl.textContent='--'; dyEl.className='val';
    statusBar.textContent = 'Nozzle tespit edilemiyor — daha yakin tutun';
  }

  requestAnimationFrame(loop);
}

document.getElementById('btnDiam').addEventListener('click', () => {
  diamIdx = (diamIdx+1) % diams.length;
  document.getElementById('btnDiam').textContent = 'Cap: '+diams[diamIdx].toFixed(2)+' mm';
});

document.getElementById('btnSens').addEventListener('click', () => {
  sensLevel = (sensLevel+1) % 3;
  document.getElementById('btnSens').textContent = 'Hassasiyet: '+sensLabels[sensLevel];
});

startCam();
</script>
</body>
</html>
